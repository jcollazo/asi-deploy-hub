name: Build Agent Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests
          pip install psutil || true  # Optional

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name asi-agent-linux \
            --add-data "src/agent.py:." \
            --hidden-import requests \
            --hidden-import json \
            --hidden-import hashlib \
            --hidden-import platform \
            --hidden-import subprocess \
            --hidden-import shutil \
            --hidden-import zipfile \
            --hidden-import tempfile \
            --hidden-import argparse \
            --hidden-import logging \
            src/agent.py

      - name: Verify binary
        run: |
          ls -lah dist/asi-agent-linux
          ./dist/asi-agent-linux --help || true

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: asi-agent-linux
          path: dist/asi-agent-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests
          pip install psutil

      - name: Build Windows binary
        run: |
          pyinstaller --onefile --name asi-agent-windows `
            --hidden-import requests `
            --hidden-import json `
            --hidden-import hashlib `
            --hidden-import platform `
            --hidden-import subprocess `
            --hidden-import shutil `
            --hidden-import zipfile `
            --hidden-import tempfile `
            --hidden-import argparse `
            --hidden-import logging `
            src/agent.py

      - name: Verify binary
        run: |
          dir dist\asi-agent-windows.exe
          .\dist\asi-agent-windows.exe --help
        continue-on-error: true

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: asi-agent-windows
          path: dist/asi-agent-windows.exe

  attach-to-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: asi-agent-linux

      - uses: actions/download-artifact@v4
        with:
          name: asi-agent-windows
          path: windows

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            asi-agent-linux
            windows/asi-agent-windows.exe
