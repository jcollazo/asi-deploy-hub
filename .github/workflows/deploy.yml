name: Deploy Portal

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
  workflow_dispatch:  # Manual trigger desde GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Verify build
        run: |
          echo "Build output:"
          ls -lah frontend/dist/
          echo "index.html exists: $([ -f frontend/dist/index.html ] && echo 'YES' || echo 'NO')"

      # ─── Deploy to server ─────────────────────────────────
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "frontend/dist/"
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          TARGET: ${{ secrets.DEPLOY_PATH }}  # e.g., /opt/asi-deploy-hub/frontend/dist/
          EXCLUDE: ".git, .github, node_modules"

      - name: Restart hub service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "Restarting ASI Hub..."
            sudo systemctl restart asi-hub || echo "systemd not available — restart manually"
            echo "Deploy complete ✅"
